<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Locked</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0c0c1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            overflow-x: hidden;
        }
        
        .phone {
            width: 100%;
            max-width: 340px;
            padding: 40px 25px 30px;
            background: linear-gradient(145deg, #1a1a2e, #0f0f23);
            border-radius: 25px;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #8e8e93;
            margin-bottom: 30px;
            padding: 0 8px;
        }
        
        .content {
            text-align: center;
        }
        
        .time {
            font-size: 56px;
            font-weight: 300;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1.5px;
        }
        
        .date {
            font-size: 16px;
            color: #8e8e93;
            margin-bottom: 30px;
        }
        
        .lock-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .subtitle {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 35px;
        }
        
        .pin-display {
            height: 42px;
            border-radius: 21px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
            letter-spacing: 5px;
            width: 200px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .recent {
            font-size: 12px;
            color: #8e8e93;
            font-family: monospace;
            height: 16px;
            margin-bottom: 25px;
        }
        
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 200px;
            margin: 0 auto;
        }
        
        .key {
            aspect-ratio: 1;
            border-radius: 16px;
            border: none;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .key:active {
            background: rgba(255,255,255,0.18);
            transform: scale(0.95);
        }
        
        .zero-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
        }
        
        .zero-key {
            flex: 2;
        }
        
        .delete-key {
            flex: 1;
            background: rgba(255,59,48,0.2);
            border: 1px solid rgba(255,59,48,0.3);
            font-size: 18px;
        }
        
        .delete-key:active {
            background: rgba(255,59,48,0.35);
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 30px;
        }
        
        .hack-box {
            text-align: center;
            max-width: 90vw;
        }
        
        .hack-title {
            font-size: 36px;
            color: #ff3b30;
            margin-bottom: 20px;
            font-weight: 700;
            animation: glitch 0.2s infinite;
            text-shadow: 0 0 15px #ff3b30;
        }
        
        @keyframes glitch {
            0% { transform: translateX(0); }
            20% { transform: translateX(-1px); }
            40% { transform: translateX(1px); }
            60% { transform: translateX(-1px); }
        }
        
        .hack-line {
            background: rgba(255,59,48,0.2);
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 16px;
            border-left: 3px solid #ff3b30;
        }
        
        .countdown {
            font-size: 54px;
            font-weight: 800;
            color: #ff9500;
            margin: 20px 0;
            text-shadow: 0 0 20px #ff9500;
            animation: pulse 0.8s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .birthday-box {
            text-align: center;
            animation: bounce 1.5s infinite;
        }
        
        .cake {
            font-size: 90px;
            margin: 20px 0;
        }
        
        .bday-title {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        .bday-text {
            font-size: 18px;
            margin: 15px 0;
            color: #e0e0e0;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px); }
            75% { transform: translateX(3px); }
        }
    </style>
</head>
<body>
    <div class="phone" id="phoneScreen">
        <div class="status-bar">
            <span id="statusTime">12:34</span>
            <span>100% 🔋</span>
        </div>
        
        <div class="content">
            <div class="time" id="mainTime">12:34</div>
            <div class="date" id="mainDate">Hari ini</div>
            
            <div class="lock-icon">🔒</div>
            <div class="title">Kunci Layar</div>
            <div class="subtitle">Masukkan PIN</div>
            
            <div class="pin-display" id="pinDisplay">••••••</div>
            <div class="recent" id="recentDisplay"></div>
            
            <div class="keypad">
                <button class="key" onclick="enterDigit('1')">1</button>
                <button class="key" onclick="enterDigit('2')">2</button>
                <button class="key" onclick="enterDigit('3')">3</button>
                
                <button class="key" onclick="enterDigit('4')">4</button>
                <button class="key" onclick="enterDigit('5')">5</button>
                <button class="key" onclick="enterDigit('6')">6</button>
                
                <button class="key" onclick="enterDigit('7')">7</button>
                <button class="key" onclick="enterDigit('8')">8</button>
                <button class="key" onclick="enterDigit('9')">9</button>
                
                <div class="zero-row">
                    <button class="key zero-key" onclick="enterDigit('0')">0</button>
                    <button class="delete-key" onclick="deleteDigit()">⌫</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Hack Screen -->
    <div class="overlay" id="hackOverlay">
        <div class="hack-box">
            <div class="hack-title">🚨 HP JEK 🤯</div>
            <div class="hack-line">📱 Kamera nyala</div>
            <div class="hack-line">🎤 Mikrofon rekam</div>
            <div class="hack-line">📂 Semua file dicuri</div>
            <div class="hack-line">📍 Lokasi ketahuan</div>
            <div class="hack-line">💳 Rekening terdeteksi</div>
            <div class="countdown" id="hackCountdown">15</div>
            <div style="color: #ff9500; font-size: 16px; font-weight: 600;">Reset HP dalam...</div>
        </div>
    </div>
    
    <!-- Birthday Screen -->
    <div class="overlay" id="bdayOverlay">
        <div class="birthday-box">
            <div class="cake">Hallo</div>
            <div class="bday-title">Boha Kabar </div>
            <div class="bday-text"> </div>
            <div class="bday-text">semoga Sehat, bahagia, rezeki melimpah!</div>
            <div class="bday-text" style="color: #ffd700; font-weight: 600;">
                Dari kami
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PIN = "160304";
        let currentPin = "";
        let recent = [];
        
        // Clock
        function updateTime() {
            const d = new Date();
            const timeStr = d.toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'});
            document.getElementById('mainTime').textContent = timeStr;
            document.getElementById('statusTime').textContent = timeStr;
            document.getElementById('mainDate').textContent = d.toLocaleDateString('id-ID', {weekday: 'short', day: 'numeric', month: 'short'});
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        function enterDigit(num) {
            if (currentPin.length < 6) {
                currentPin += num;
                recent.unshift(num);
                if (recent.length > 6) recent.pop();
                updatePinDisplay();
                
                if (navigator.vibrate) navigator.vibrate(20);
                
                if (currentPin.length === 6) {
                    setTimeout(checkPin, 200);
                }
            }
        }
        
        function deleteDigit() {
            currentPin = currentPin.slice(0, -1);
            if (recent.length) recent.shift();
            updatePinDisplay();
            if (navigator.vibrate) navigator.vibrate(10);
        }
        
        function updatePinDisplay() {
            document.getElementById('pinDisplay').textContent = '•'.repeat(currentPin.length) + '•'.repeat(6-currentPin.length);
            document.getElementById('recentDisplay').textContent = recent.join(' ');
        }
        
        function checkPin() {
            const phone = document.getElementById('phoneScreen');
            
            if (currentPin === CORRECT_PIN) {
                // HACK MODE - 15 DETIK PANIK!
                phone.style.display = 'none';
                document.getElementById('hackOverlay').style.display = 'flex';
                
                let count = 15;
                const cd = document.getElementById('hackCountdown');
                const int = setInterval(() => {
                    count--;
                    cd.textContent = count;
                    if (count <= 0) {
                        clearInterval(int);
                        showBirthday();
                    }
                }, 1000);
                
            } else {
                // PIN SALAH
                phone.style.animation = 'shake 0.4s';
                document.getElementById('pinDisplay').textContent = 'SALAH';
                document.getElementById('pinDisplay').style.color = '#ff3b30';
                
                setTimeout(() => {
                    phone.style.animation = '';
                    currentPin = '';
                    recent = [];
                    updatePinDisplay();
                }, 500);
            }
        }
        
        function showBirthday() {
            document.getElementById('hackOverlay').style.display = 'none';
            document.getElementById('bdayOverlay').style.display = 'flex';
        }
        
        // Prevent back
        history.pushState(null, null, location.href);
        window.onpopstate = () => history.go(1);
        
        // Block gestures
        document.addEventListener('touchstart', e => {
            if (e.touches.length > 1) e.preventDefault();
        });
        
        let lastTouch = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouch <= 300) e.preventDefault();
            lastTouch = now;
        });
    </script>
</body>
</html>
